name: Deploy Pattern Studio to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["fai-pattern-studio/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: fai-pattern-studio/package-lock.json
      - run: npm ci
        working-directory: fai-pattern-studio
      - run: npx vite build
        working-directory: fai-pattern-studio
      - uses: actions/upload-pages-artifact@v3
        with:
          path: fai-pattern-studio/dist-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
