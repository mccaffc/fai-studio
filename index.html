<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FAI Studio</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <meta name="theme-color" content="#121212" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/studio/styles.css" />
</head>
<body>
  <header>
    <div class="brand">
      <img src="./fai-acronym-white.svg" alt="FAI" />
      <span class="product-name">Studio</span>
    </div>
    <div id="mode-toggle" class="chips" style="gap:4px"></div>
    <div style="display:flex; align-items:center; gap:18px">
      <a href="./dither/" style="font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.04em; text-transform:uppercase; color:#f3f3f3; text-decoration:none; border:1px solid #2a2a2a; padding:6px 12px">Chevron Dither →</a>
    </div>
  </header>
  <main>
    <aside id="controls"></aside>
    <aside id="corpus-controls"></aside>
    <section class="stage">
      <div id="canvas" class="canvas"></div>
      <div class="canvas-actions" id="canvas-actions"></div>
      <div id="action-status" class="action-status"></div>
      <div id="corpus-scores" class="corpus-scores"></div>
      <p class="export-note">Exports are sRGB. To keep exact brand hex (Cod Gray #121212, etc.), set your Illustrator document to sRGB — otherwise its color management nudges values (e.g. #121212 → #131313) on paste.</p>
      <h2>Variations <span class="hint">click to promote · space to reroll</span></h2>
      <div id="variations" class="tray"></div>
      <h2 id="saved-heading">Saved <span class="hint">persists locally</span></h2>
      <div id="saved" class="tray"></div>
    </section>
  </main>
  <script type="module" src="/src/studio/main.ts"></script>
</body>
</html>
