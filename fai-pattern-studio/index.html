<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FAI Pattern Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/studio/styles.css" />
</head>
<body>
  <header>
    <div class="brand">
      <img class="mark" src="./logomark-white.svg" alt="FAI" />
      <span class="title">Pattern Studio</span>
    </div>
    <div class="sub">seeded · deterministic · brand-locked</div>
  </header>
  <main>
    <aside id="controls"></aside>
    <section class="stage">
      <div id="canvas" class="canvas"></div>
      <div class="canvas-actions" id="canvas-actions"></div>
      <h2>Variations <span class="hint">click to promote · space to reroll</span></h2>
      <div id="variations" class="tray"></div>
      <h2>Saved <span class="hint">persists locally</span></h2>
      <div id="saved" class="tray"></div>
    </section>
  </main>
  <script type="module" src="/src/studio/main.ts"></script>
</body>
</html>
